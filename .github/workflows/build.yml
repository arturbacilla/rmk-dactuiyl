name: Build firmware according to user config file
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  LIBSSL: "libssl1.1_1.1.1f-1ubuntu2_amd64.deb"

jobs:
  get_chip_name:
    if: (github.event_name == 'push' && !contains(github.event.head_commit.message, 'Merge') && !contains(github.event.head_commit.message, 'pipeline(') && !contains(github.event.head_commit.message, 'docs(')) 
    runs-on: ubuntu-latest
    outputs:
      chip_name: ${{ steps.capture.outputs.chip_name }}
    steps:
      - uses: cargo-bins/cargo-binstall@main
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            libssl*.deb
          key: ${{ runner.os }}-libssl
      - name: Install libssl
        run: |
          [ ! -f $LIBSSL ] && wget http://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/$LIBSSL
          sudo dpkg -i $LIBSSL
      - name: Install rmkit
        run: cargo binstall rmkit -y
      - name: Get chip name
        id: capture
        run: |
          # Run rmkit command to get the chip name
          OUTPUT=$(rmkit get-chip --keyboard-toml-path keyboard.toml)

          # Print the output to confirm
          echo "Command output: $OUTPUT"

          # Save the output as a GitHub Actions output variable
          echo "chip_name=$OUTPUT" >> $GITHUB_OUTPUT

  build_esp:
    if: (needs.get_chip_name.outputs.chip_name == 'esp32s3' && github.event_name == 'push' && !contains(github.event.head_commit.message, 'Merge') && !contains(github.event.head_commit.message, 'pipeline(') && !contains(github.event.head_commit.message, 'docs(')) 
    runs-on: ubuntu-latest
    needs: get_chip_name
    steps:
      - uses: cargo-bins/cargo-binstall@main
      - uses: actions/checkout@v4
      # 1. Cache the ESP Toolchain (~/export-esp.sh and ~/.rustup/toolchains/esp)
      - name: Cache ESP Toolchain
        id: cache-esp
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/esp
            ~/export-esp.sh
            ~/.espressif
          key: ${{ runner.os }}-esp-toolchain-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-esp-toolchain-
      # 2. Cache Cargo Binaries (espup, espflash, rmkit)
      - name: Cache Cargo Bins
        id: cache-bins
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bins
      # Install Libssl (System level, usually fast, but kept for consistency)
      - name: Install libssl
        run: |
          LIBSSL="libssl1.1_1.1.1f-1ubuntu2_amd64.deb"
          if [ ! -f $LIBSSL ]; then
            wget http://nz2.archive.ubuntu.com/ubuntu/pool/main/o/openssl/$LIBSSL
          fi
          sudo dpkg -i $LIBSSL

      # Only install tools if the bin cache missed
      - name: Install binstall
        if: steps.cache-bins.outputs.cache-hit != 'true'
        uses: cargo-bins/cargo-binstall@main

      - name: Install ESP tools via binstall
        if: steps.cache-bins.outputs.cache-hit != 'true'
        run: cargo binstall rmkit espflash espup -y

      # Only run espup if toolchain is missing
      - name: Prepare esp environment
        if: steps.cache-esp.outputs.cache-hit != 'true'
        run: espup install

      - name: Create firmware project
        working-directory: .
        run: rmkit create --keyboard-toml-path keyboard.toml --vial-json-path vial.json --version main --target-dir rmk
      - name: Build firmware for esp32
        working-directory: ./rmk
        run: . /home/runner/export-esp.sh && RUST_BACKTRACE=fulll cargo +esp build --release
      - name: Get target arch
        id: arch
        run: |
          if [ "${{ needs.get_chip_name.outputs.chip_name }}" == "esp32c3" ]; then
            ARCH="riscv32imc-unknown-none-elf"
          elif [ "${{ needs.get_chip_name.outputs.chip_name }}" == "esp32s3" ]; then
            ARCH="xtensa-esp32s3-none-elf"
          elif [ "${{ needs.get_chip_name.outputs.chip_name }}" == "esp32c6" ]; then
            ARCH="riscv32imac-unknown-none-elf"
          else
            ARCH=""
          fi
          echo "arch $ARCH"
          # Save the arch as a GitHub Actions output variable
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
      - name: convert firmware to bin
        working-directory: ./rmk
        run: espflash save-image --chip ${{ needs.get_chip_name.outputs.chip_name }} "./target/${{ steps.arch.outputs.arch }}/release/central" --merge ./rmk-central.bin
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware_bin
          path: rmk/*.bin